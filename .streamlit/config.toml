# =============================================================================
# fetalmetrics-ai — Streamlit runtime theme
# Clinical-light "medical instrument" palette. The full visual system lives in
# src/assets/styles.css; this file only teaches Streamlit's *native* widgets
# (slider, radio, number input, alerts, spinner, checkbox) the base palette so
# they sit correctly on the light canvas. Custom-drawn components are styled in
# the stylesheet.
# =============================================================================

[theme]
base = "light"
primaryColor = "#0F766E"            # deep medical teal — interactive accent
backgroundColor = "#F4F6F9"         # clinical paper canvas
secondaryBackgroundColor = "#FFFFFF" # sidebar + widget surfaces
textColor = "#16202E"               # deep slate ink
font = "sans serif"

[client]
# We render our own controlled sidebar navigation (Analyze / Methodology),
# so the automatic multipage nav widget is hidden for a cleaner instrument feel.
showSidebarNavigation = false
toolbarMode = "minimal"

[server]
runOnSave = true
